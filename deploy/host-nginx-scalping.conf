# Host nginx vhost — use when port 80/443 is already taken by another project.
# Copy to /etc/nginx/sites-available/scalping.optionperks.com and enable.
# Requires: CADDY_ENABLED=false, WEB_HOST_PORT=8090 in .env

server {
    listen 80;
    server_name scalping.optionperks.com;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# After certbot: certbot --nginx -d scalping.optionperks.com
# Or add your own ssl_certificate blocks here.
