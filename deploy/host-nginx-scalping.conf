# Host nginx vhost — use when port 80/443 is already taken by another project.
# Copy to /etc/nginx/sites-available/scalping.optionperks.com and enable.
# Requires: CADDY_ENABLED=false
# Set WEB_HOST_PORT in .env (default 28790) and match proxy_pass below.

server {
    listen 80;
    server_name scalping.optionperks.com;

    location / {
        proxy_pass http://127.0.0.1:28790;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# After certbot: certbot --nginx -d scalping.optionperks.com
