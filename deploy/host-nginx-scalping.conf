# Host nginx for scalping.optionperks.com → Docker web on 127.0.0.1:28790
#
# Install:
#   sudo cp deploy/host-nginx-scalping.conf /etc/nginx/sites-available/scalping.optionperks.com
#   sudo ln -sf /etc/nginx/sites-available/scalping.optionperks.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (if certs not yet issued):
#   sudo certbot --nginx -d scalping.optionperks.com
#
# If you get 301 loops: remove duplicate server_name blocks for this domain
#   grep -r scalping.optionperks /etc/nginx/

# ── HTTP — proxy OR certbot challenge (do not redirect until HTTPS block exists) ──
server {
    listen 80;
    listen [::]:80;
    server_name scalping.optionperks.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:28790;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

# ── HTTPS — required for https:// URLs (certbot fills ssl_certificate paths) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scalping.optionperks.com;

    # certbot --nginx will update these paths automatically
    ssl_certificate     /etc/letsencrypt/live/scalping.optionperks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scalping.optionperks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:28790;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
