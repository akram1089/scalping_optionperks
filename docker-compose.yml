services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scalpdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scalpdesk}
      POSTGRES_DB: ${POSTGRES_DB:-scalpdesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port — api/worker connect via Docker network (avoids 5432 conflicts)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scalpdesk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port — avoids conflicts with local Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scalpdesk}:${POSTGRES_PASSWORD:-scalpdesk}@postgres:5432/${POSTGRES_DB:-scalpdesk}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scalpdesk}:${POSTGRES_PASSWORD:-scalpdesk}@postgres:5432/${POSTGRES_DB:-scalpdesk}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
