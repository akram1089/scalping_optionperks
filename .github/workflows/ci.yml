name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t scalpdesk-api ./backend

      - name: Build Web image
        run: |
          docker build -t scalpdesk-web ./frontend \
            --build-arg VITE_API_URL=https://scalping.optionperks.com/api \
            --build-arg VITE_WS_URL=wss://scalping.optionperks.com/api

      - name: Frontend typecheck
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: frontend
